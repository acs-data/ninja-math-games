name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Inject cache version into Service Worker
        # Remplace __CACHE_VERSION__ par le SHA court du commit pour invalider
        # automatiquement le cache PWA à chaque déploiement.
        run: |
          SHA_SHORT="${GITHUB_SHA:0:8}"
          sed -i "s|__CACHE_VERSION__|${SHA_SHORT}|g" sw.js
          echo "Cache version set to: amat-${SHA_SHORT}"
          grep "CACHE_NAME" sw.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Sert tout le dépôt à la racine (site statique mono-fichier)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
